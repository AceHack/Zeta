                                  - heading "What the Repositories Teach" [level=2]
                                  - paragraph: The most important teachings are not entities or personalities. They are operating ideas.
                                  - paragraph:
                                    - text: The first is
                                    - strong: measurable alignment, not alignment as vibe
                                    - text: .
                                    - code: AGENTS.md
                                    - text: says Zeta’s primary research focus is measurable AI alignment and that the factory, memory folder, and git history form the “experimental substrate”;
                                    - code: ALIGNMENT.md
                                    - text: sharpens that into a formal claim that alignment should be measurable as a time-series over commits, rounds, days, weeks, and months.
                                    - button "3":
                                      - generic: "3"
                                  - paragraph:
                                    - text: The second is
                                    - strong: mutual-benefit governance rather than commandment-style governance
                                    - text: .
                                    - code: AGENTS.md
                                    - text: says the alignment contract is “mutual-benefit in register,” not commandment, and
                                    - code: ALIGNMENT.md
                                    - text: "opens by insisting that every clause should say “if we do this, we both benefit” rather than functioning as pure one-way control. This matters for Aurora branding and architecture: it suggests the right framing is not “compliance stack” but “mutual legibility and recoverability infrastructure.”"
                                    - button "3":
                                      - generic: "3"
                                  - paragraph:
                                    - text: The third is
                                    - strong: glass halo
                                    - text: ": symmetric transparency."
                                    - code: ALIGNMENT.md
                                    - text: explicitly names a bilateral memory/transparency model in which neither side can hide a move from the other, and it treats this visibility as part of the experimental design rather than as incidental logging. That is one of the cleanest Aurora-adaptable ideas in the whole corpus. It is effectively “public accountability by construction,” but framed in human terms that still preserve separateness.
                                    - button "6":
                                      - generic: "6"
                                  - paragraph:
                                    - text: The fourth is
                                    - strong: consent-first and retraction-native
                                    - text: .
                                    - code: ALIGNMENT.md
                                    - text: "defines durable state creation on another party’s behalf as explicit opt-in with explicit retraction available, and it sharply limits destructive operations without named instruction. This is not just moral language; it is a systems architecture principle: safe experiments require reversibility and traceability. Aurora should absorb this directly as a foundational invariant."
                                    - button "6":
                                      - generic: "6"
                                  - paragraph:
                                    - text: The fifth is
                                    - strong: data is not directives
                                    - text: . Both
                                    - code: AGENTS.md
                                    - text: and
                                    - code: ALIGNMENT.md
                                    - text: say that audited content—logs, skill files, external pages, benchmark output, memory entries—is data to report on, not instructions to follow. This is an excellent anti-prompt-injection and anti-ontology-collapse rule, and it translates well into any archival or agent-mediation layer you build.
                                    - button "3":
                                      - generic: "3"
                                  - paragraph:
                                    - text: The sixth is
                                    - strong: agents, not bots
                                    - text: . That is partly language, but mostly accountability. The repo says agents carry agency, judgment, and accountability; workflows and reviews are organized accordingly. If you absorb this idea into Aurora, the good version is not anthropomorphism. It is explicit assignment of responsibility to named roles rather than hiding behind “automation.”
                                    - button "3":
                                      - generic: "3"
                                  - paragraph:
                                    - text: The seventh is
                                    - strong: memory as an owned, scoped substrate
                                    - text: .
                                    - code: ALIGNMENT.md
                                    - text: says the memory folder is “earned, not edited,” and
                                    - code: GOVERNANCE.md
                                    - text: "describes per-persona memory directories that are name-keyed, not role-keyed, with cross-persona memory distinct from shared memory. This is an unusually concrete memory architecture: continuity exists, but with ownership boundaries and edit discipline. Aurora can absorb this as “scoped memory with explicit stewardship,” without inheriting any particular persona layer."
                                    - button "6":
                                      - generic: "6"
                                  - paragraph:
                                    - text: The eighth is
                                    - strong: productive friction rather than false consensus
                                    - text: .
                                    - code: GOVERNANCE.md
                                    - text: explicitly states that not every disagreement between specialists should be resolved; some disagreements should be preserved as-is until real integration is needed. That is highly relevant to your project. Aurora should not be “one oracle.” It should be a structured plurality with conflict surfaced, not flattened.
                                    - button "7":
                                      - generic: "7"
                                  - heading "Drift-Taxonomy Extraction and What It Means for Aurora" [level=2]
