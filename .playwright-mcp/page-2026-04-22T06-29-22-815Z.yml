                                  - heading "Open Questions and Limitations" [level=2]
                                  - paragraph: I did not perform a literal repo mirror or push content into another repository, because that write path was not exposed in the tools available here.
                                  - paragraph:
                                    - text: I could validate the public GitHub surfaces well. I could not, from the non-GitHub connectors, find substantial Zeta/Aurora-supporting emails, drive docs, calendar events, or Dropbox materials that looked clearly project-relevant. That does
                                    - emphasis: not
                                    - text: prove they do not exist; it means the connector-first discovery scan did not surface them.
                                  - paragraph: I have high confidence in the root structure, doctrine files, research surface, and precursor drift-taxonomy interpretation. I have lower confidence in any stronger claim about current maintainer workflow between the fork and main org repository unless I were to rely more heavily on uncited live PR metadata from the GitHub connector. The connected GitHub tool clearly shows recent activity that supports that interpretation, but I am treating the repo pages and doctrine files as the highest-confidence, citable base.
                                  - paragraph:
                                    - text: "The final practical conclusion is simple:"
                                    - strong: do not import the repos as personalities or as a fused “one thing.” Import them as a design grammar.
                                    - text: The repositories themselves, and especially the precursor drift paper, are already telling you to do exactly that.
