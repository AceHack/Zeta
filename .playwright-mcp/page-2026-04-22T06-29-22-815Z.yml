                                    - text: The precursor paper is one of the most useful documents for your specific ask because it says, in plain terms, exactly what should and should not be absorbed. It is explicitly labeled a
                                    - strong: research-grade absorb
                                    - text: rather than operational policy, and it states that only the ideas are absorbed while the source-side conversational partner is
                                    - emphasis: not
